<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Basket - Facemaker Pottery</title>
  <style>
    body { font-family: Georgia, serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #f5f0eb; color: #333; }
    nav { background: #8b5e3c; padding: 12px 20px; border-radius: 6px; margin-bottom: 30px; display: flex; align-items: center; justify-content: space-between; }
    nav .nav-left a { color: white; text-decoration: none; margin-right: 20px; font-size: 1.1em; }
    nav .nav-left a:hover { text-decoration: underline; }
    nav .basket-link { color: white; text-decoration: none; font-size: 1.1em; }
    nav .basket-link:hover { text-decoration: underline; }
    .basket-count { background: #f5c842; color: #333; border-radius: 50%; padding: 1px 7px; font-size: 0.8em; font-weight: bold; margin-left: 4px; display: none; }
    .basket-count.visible { display: inline; }
    h1 { color: #8b5e3c; }
    .empty { text-align: center; padding: 60px 0; color: #888; font-size: 1.1em; }
    .empty a { color: #8b5e3c; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    th { background: #8b5e3c; color: white; padding: 12px 16px; text-align: left; font-weight: normal; }
    td { padding: 14px 16px; border-bottom: 1px solid #f0e8e0; }
    tr:last-child td { border-bottom: none; }
    .qty-controls { display: flex; align-items: center; gap: 10px; }
    .qty-btn { background: #f5f0eb; border: 1px solid #ccc; border-radius: 4px; width: 28px; height: 28px; font-size: 1em; cursor: pointer; }
    .qty-btn:hover { background: #e0d8d0; }
    .qty-val { width: 30px; text-align: center; font-size: 1em; }
    .remove { background: none; border: none; color: #999; cursor: pointer; font-size: 1.1em; padding: 4px; }
    .remove:hover { color: #c0392b; }
    .totals { background: white; border-radius: 8px; padding: 20px; margin-top: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); text-align: right; }
    .totals .total-line { font-size: 1.3em; font-weight: bold; color: #8b5e3c; margin-bottom: 16px; }
    .checkout-btn { background: #8b5e3c; color: white; padding: 12px 30px; border-radius: 4px; text-decoration: none; font-size: 1.05em; border: none; cursor: pointer; font-family: Georgia, serif; }
    .checkout-btn:hover { background: #6d4a2e; }
    .continue { display: inline-block; margin-top: 16px; color: #8b5e3c; text-decoration: none; font-size: 0.95em; }
    .continue:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
    </div>
    <a href="basket.html" class="basket-link">&#x1F6D2; Basket<span class="basket-count" id="basket-count"></span></a>
  </nav>

  <h1>Your Basket</h1>
  <div id="basket-content"></div>

  <script>
    function getBasket() {
      return JSON.parse(sessionStorage.getItem('basket') || '[]');
    }

    function saveBasket(basket) {
      sessionStorage.setItem('basket', JSON.stringify(basket));
    }

    function updateCount() {
      const basket = getBasket();
      const total = basket.reduce((sum, item) => sum + item.qty, 0);
      const el = document.getElementById('basket-count');
      el.textContent = total;
      el.classList.toggle('visible', total > 0);
    }

    function render() {
      const basket = getBasket();
      const container = document.getElementById('basket-content');
      updateCount();

      if (basket.length === 0) {
        container.innerHTML = '<div class="empty"><p>Your basket is empty.</p><a href="shop.html">Browse the shop &rarr;</a></div>';
        return;
      }

      const total = basket.reduce((sum, i) => sum + i.price * i.qty, 0);

      const rows = basket.map((item, idx) => `
        <tr>
          <td>${item.name}</td>
          <td>£${item.price}</td>
          <td>
            <div class="qty-controls">
              <button class="qty-btn" onclick="changeQty(${idx}, -1)">−</button>
              <span class="qty-val">${item.qty}</span>
              <button class="qty-btn" onclick="changeQty(${idx}, 1)">+</button>
            </div>
          </td>
          <td>£${item.price * item.qty}</td>
          <td><button class="remove" onclick="removeItem(${idx})" title="Remove">✕</button></td>
        </tr>
      `).join('');

      container.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Item</th>
              <th>Price</th>
              <th>Qty</th>
              <th>Subtotal</th>
              <th></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="totals">
          <div class="total-line">Total: £${total}</div>
          <a href="checkout.html" class="checkout-btn">Proceed to checkout</a>
          <br>
          <a href="shop.html" class="continue">← Continue shopping</a>
        </div>
      `;
    }

    function changeQty(idx, delta) {
      const basket = getBasket();
      basket[idx].qty += delta;
      if (basket[idx].qty <= 0) basket.splice(idx, 1);
      saveBasket(basket);
      render();
    }

    function removeItem(idx) {
      const basket = getBasket();
      basket.splice(idx, 1);
      saveBasket(basket);
      render();
    }

    render();
  </script>
</body>
</html>
