<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="slash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background square with rounded corners -->
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>

  <!-- Left bracket < -->
  <polyline points="62,68 38,100 62,132"
    fill="none" stroke="white" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right bracket > -->
  <polyline points="138,68 162,100 138,132"
    fill="none" stroke="white" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Slash / in brand colour -->
  <line x1="118" y1="60" x2="82" y2="140"
    stroke="url(#slash)" stroke-width="13" stroke-linecap="round"/>
</svg>
